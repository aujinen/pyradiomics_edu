imageType:
  Original: {}

featureClass:
  shape2D:
  firstorder:
  glcm:
    - 'Autocorrelation'
    - 'JointAverage'
    - 'ClusterProminence'
    - 'ClusterShade'
    - 'ClusterTendency'
    - 'Contrast'
    - 'Correlation'
    - 'DifferenceAverage'
    - 'DifferenceEntropy'
    - 'DifferenceVariance'
    - 'JointEnergy'
    - 'JointEntropy'
    - 'Imc1'
    - 'Imc2'
    - 'Idm'
    - 'Idmn'
    - 'Id'
    - 'Idn'
    - 'InverseVariance'
    - 'MaximumProbability'
    - 'SumEntropy'
    - 'SumSquares'
  glrlm:
  glszm:
  gldm:
  ngtdm:

setting:
  # Normalization:
  # normalize: true
  # normalizeScale: 100
  # Resampling:
  # first dimensions always correspond to in-plane resolution.
  # Z-plane resolution should not be modified to avoid mask errors (> than 1 slice after resampling)
  # interpolator: 'sitkBSpline'
  # resampledPixelSpacing: [2, 2, 0]
  # padDistance: 10
  # preCrop: true

  weightingNorm: no_weighting
  # weightingNorm: None（デフォルト）
  # 各角度ごとに特徴量を計算し、最後に平均を取ります。
  # weightingNorm: no_weighting
  # 角度を統合した GLCM を先に作り、そこから特徴量を計算します。

  # 2D settings
  # force2Ddimension setting is relative to the acquisition plane.
  # For example, the axial plane (0) corresponds to the acquisition plane (axial, sagittal or coronal) of the MRI volume.
  # Therefore, in most cases this setting should not be modified.
  force2D: true
  force2Ddimension: 0
  
  # Image discretization:
  # This parameter should be estimated by analyzing the dataset firstorder range and chosen to be as close as possible to the 30-130 range. 
  binWidth: 1


